<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧩 Défi chrono — Menu burger</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      color: #1f2937;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #1f2937;
      color: white;
    }

    .logo { font-weight: bold; font-size: 1.2rem; }

    .menu-btn {
      background: none;
      border: 2px solid white;
      color: white;
      font-size: 1.5rem;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      border-radius: 0.25rem;
    }

    nav {
      display: none;
      background: #111827;
      padding: 1rem;
    }

    nav.is-open {
      display: block;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav li { padding: 0.5rem 0; }

    nav a {
      color: white;
      text-decoration: none;
    }

    main {
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    .consigne {
      background: #fef3c7;
      border: 2px solid #f59e0b;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .consigne h1 { margin-top: 0; font-size: 1.3rem; }

    code {
      background: #f3f4f6;
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <span class="logo">Défi</span>
    <button class="menu-btn">☰</button>
  </header>

  <nav>
    <ul>
      <li><a href="#">Accueil</a></li>
      <li><a href="#">Projets</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="consigne">
      <h1>🧩 Défi chrono</h1>
      <p>Faites fonctionner ce menu burger en <strong>le moins de lignes de JS possible</strong>.</p>
      <p>Le bouton <code>☰</code> doit ouvrir/fermer le menu.<br>La touche <code>Escape</code> doit le fermer.</p>
      <p>Le CSS est prêt : la classe <code>.is-open</code> sur le <code>&lt;nav&gt;</code> affiche le menu.</p>
    </div>
  </main>

  <script>
    const bouton = document.querySelector('.menu-btn'); 
    const menu = document.querySelector('nav');
    bouton.addEventListener('click', () => {  
     menu.classList.toggle('is-open'); 
});

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape' && menu.classList.contains('is-open')) {
    menu.classList.remove('is-open');
    bouton.focus(); 
  }
});
  </script>

</body> 
</html>
